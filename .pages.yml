# =====================================================================
# PagesCMS 後台設定檔（v2，2026-06-11）
# 作用：定義「玲玲在後台能編輯哪些內容」。
# 重點：這裡只列出「內容類」檔案 → 後台就只看得到這些。
#       程式碼／版面檔（index.html、各分頁、assets/js/site.js、
#       assets/css/style.css）刻意不列入 → 後台看不到、動不到，
#       由 Justin 維護。這就是「你管功能/版面、玲玲管內容」的分工機制。
#
# 資料結構（v2 已完成轉換）：
#   - 文章：content/articles/*.md（每篇一個 Markdown）
#   - 社群：content/community.yml
#   - 課程：content/course.yml
#   - 分享天地：content/weekly/*.md（後台新增後自動出現）
# GitHub Action 自動重建：data/articles.json、data/community.json、data/course.json
# =====================================================================

# 圖片上傳區（玲玲在後台插圖會存到這裡）
media:
  input: assets/images
  output: /assets/images
  extensions: [jpg, jpeg, png, webp, gif]

content:
  # ---------- 1. 心情日誌（文章） ----------
  - name: articles
    label: 心情日誌（文章）
    type: collection
    path: content/articles
    filename: "{year}-{month}-{day}-{primary}.md"
    view:
      fields: [title, category, date]
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - { name: title, label: 標題, type: string, required: true }
      - { name: date, label: 發布日期, type: date, required: true }
      - name: category
        label: 分類
        type: select
        options:
          values:
            - { value: ai,        label: AI 學習應用 }
            - { value: growth,    label: 媽媽自我成長 }
            - { value: parenting, label: 親子生活指南 }
            - { value: travel,    label: 親子旅遊 }
            - { value: diy,       label: 親子手作 }
      - { name: cover,    label: 封面圖,              type: image }
      - { name: excerpt,  label: 摘要（卡片顯示）,   type: text }
      - { name: tags,     label: 標籤,               type: string, list: true }
      - { name: source,   label: 原文連結（方格子）,  type: string }
      - { name: readMin,  label: 閱讀分鐘數,          type: number }
      - { name: body,     label: 內文,               type: rich-text }

  # ---------- 2. 分享天地（每週精選） ----------
  # 說明：auto（自動抓取）的項目由 GitHub Action 自動寫入，status=pending。
  #       玲玲在這裡填寫「Vicky 心情分享」並把 status 改為 published 後，
  #       下次 build.py 執行就會出現在前台。
  - name: weekly
    label: 分享天地（每週精選）
    type: collection
    path: content/weekly
    filename: "{year}-{month}-{day}-{primary}.md"
    view:
      fields: [title, status, category, fetch_date]
      default: { sort: fetch_date, order: desc }
    fields:
      - { name: title,       label: 標題,                 type: string, required: true }
      - { name: url,         label: 原文／工具連結,        type: string }
      - { name: source_name, label: 來源（親子天下 等）,   type: string }
      - name: category
        label: 類型
        type: select
        options:
          values:
            - { value: tool, label: AI 工具 }
            - { value: news, label: 親子新聞 }
      - { name: auto_excerpt, label: 自動摘要（參考用）,   type: text }
      - { name: note,         label: Vicky 心情分享（必填，發布前請填寫）, type: text }
      - name: status
        label: 狀態
        type: select
        options:
          values:
            - { value: pending,   label: 待審（尚未上線） }
            - { value: published, label: 已發布（上線中） }
            - { value: rejected,  label: 不採用 }
      - { name: publish_week, label: 發布週次（格式 2026-W24）, type: string }
      - { name: fetch_date,   label: 自動抓取日期,              type: date }
      - { name: pub_date,     label: 原文發布日期,              type: date }

  # ---------- 3. 每週精選來源管理 ----------
  # 玲玲可以在這裡新增/停用/刪除自動抓取的 RSS 來源。
  # 說明：RSS 網址通常是「網站首頁/feed」或「網站首頁/rss」，不確定的話請 Justin 幫忙查。
  - name: weekly_sources
    label: 每週精選來源管理
    type: file
    path: content/weekly_sources.yml
    fields:
      - name: sources
        label: RSS 來源清單
        type: object
        list: true
        fields:
          - { name: name,      label: 來源名稱（例：親子天下）,                  type: string, required: true }
          - { name: url,       label: RSS 網址（通常是網站/feed 或 網站/rss）,   type: string, required: true }
          - name: category
            label: 類型
            type: select
            options:
              values:
                - { value: news, label: 親子新聞 }
                - { value: tool, label: AI 工具 }
          - { name: max_items, label: 每次最多抓幾篇（建議 3～5）, type: number }
          - { name: enabled,   label: 啟用此來源,                  type: boolean }

  # ---------- 4. 社群交流圈（單頁設定） ----------
  - name: community
    label: 社群交流圈（設定）
    type: file
    path: content/community.yml
    fields:
      - { name: socialIntro, label: 社群介紹文, type: text }
      - { name: socialImage, label: 社群主圖,   type: image }
      - name: videos
        label: 影片清單
        type: object
        list: true
        fields:
          - { name: id,    label: YouTube 影片 ID, type: string }
          - { name: title, label: 影片標題,        type: string }
      - { name: line,     label: LINE 共學團連結, type: string }
      - { name: fb,       label: Facebook,        type: string }
      - { name: ig,       label: Instagram,       type: string }
      - { name: channel,  label: YouTube 頻道,    type: string }
      - { name: playlist, label: 播放清單,        type: string }

  # ---------- 4. 課程（單頁設定） ----------
  - name: course
    label: 課程（設定）
    type: file
    path: content/course.yml
    fields:
      - { name: title,    label: 課程名稱,   type: string }
      - { name: sub,      label: 副標,       type: string }
      - { name: desc,     label: 課程說明,   type: text }
      - { name: outline,  label: 課程大綱,   type: string, list: true }
      - { name: meta,     label: 形式／時長, type: string }
      - { name: suitable, label: 適合對象,   type: string }
      - { name: link,     label: 報名連結,   type: string }
