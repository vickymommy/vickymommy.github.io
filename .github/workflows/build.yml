name: 重建 data JSON（舊版，保留手動觸發）

# ── 觸發時機 ──────────────────────────────────────────────────────────────────
# 注意：content/** push 觸發已移至 build_on_push.yml
#       （功能更完整，含 weekly.json 重建與 bot 防護）
# 此 workflow 僅保留 workflow_dispatch，供手動觸發使用
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要寫入權限才能 push 更新後的 JSON

    steps:
      - name: Checkout 倉庫
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝相依套件
        run: pip install pyyaml

      - name: 執行建置腳本
        run: python scripts/build.py

      - name: 提交並推送更新後的 JSON
        run: |
          git config user.name "github-actions[bot]"
