<p>兔年一定要有的可愛兔子燈籠教學手作來囉！我們運用家裡現有的材料，拼拼湊湊做出了一個簡易版燈籠，做法很簡單，適合和孩子一起創作唷！</p><h2>⭐ 觀看影片</h2><a class="ytlink" href="https://www.youtube.com/watch?v=g4xsjF7nDgc" target="_blank" rel="noopener"><img src="https://img.youtube.com/vi/g4xsjF7nDgc/hqdefault.jpg" loading="lazy" alt="觀看 YouTube 影片"><span class="ytplay">▶ 在 YouTube 觀看影片</span></a><p><br></p><h2>材料</h2><p>白色圖畫紙、彩色不織布、紙箱、雙面膠帶、剪刀、LED燈、萬用膠、麥克筆、活動眼睛、毛球</p><h2>步驟</h2><p>把紙箱上方剪掉，四邊貼上圖畫紙</p><figure><img src="assets/images/9715b66c-a73e-4c90-87d5-5e79d5bb3235.png" loading="lazy" alt=""></figure><p>貼上活動眼睛，用麥克筆畫兔子的鼻子</p><figure><img src="assets/images/3dee674f-522d-4b9c-8682-7674d79272dc.png" loading="lazy" alt=""></figure><p>黏上毛球</p><figure><img src="assets/images/ed735a0b-4690-4e46-bd4c-266e413976df.png" loading="lazy" alt=""></figure><p>在不織布上畫兔子的耳朵和紅蘿蔔，剪下來</p><figure><img src="assets/images/90125a70-4274-45d3-8b6b-a8a32ad87867.png" loading="lazy" alt=""></figure><figure><img src="assets/images/26b50b07-a6e8-44ce-8241-9d3e2de98450.png" loading="lazy" alt=""></figure><p>用萬用膠把耳朵和紅蘿蔔黏在紙箱上</p><figure><img src="assets/images/236a4432-f85e-4f93-a6b0-8a87f41b4d5e.png" loading="lazy" alt=""></figure><p>在紙箱兩側鑽孔後綁上提繩</p><figure><img src="assets/images/d5b3b643-7395-4bcd-87e1-050d43538077.png" loading="lazy" alt=""></figure><p>紙箱內放入LED燈就完成囉！小漢堡也自己做了一個塑膠罐兔子燈籠呢！</p><h2><br><br></h2>
